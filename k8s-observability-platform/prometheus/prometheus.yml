global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Local docker-compose target. In the k8s manifests, the pod annotations
  # (prometheus.io/scrape) handle discovery instead via kubernetes_sd_configs.
  - job_name: "order-service"
    static_configs:
      - targets: ["app:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
