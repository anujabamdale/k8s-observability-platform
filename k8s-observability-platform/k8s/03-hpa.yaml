apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: order-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scaling on CPU% here (not memory) because this workload's
          # /cpu-intensive endpoint is CPU-bound; a memory-leak-prone service
          # would instead want a memory-based or custom-metric target.
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # scale up fast under real load
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120   # scale down slowly to avoid flapping
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
